<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella's AI 新聞日報</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0EBE3;
      --surface: #FAF7F3;
      --border: #D6CBB8;
      --accent: #8B3A2A;
      --accent-light: #C4735F;
      --text: #2C2318;
      --text-muted: #7A6A58;
      --highlight-bg: #FFF3CD;
    }

    body {
      font-family: "Noto Sans TC", "PingFang TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(44,35,24,0.08);
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .site-title {
      font-family: "Noto Serif TC", serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .controls {
      display: flex;
      gap: 0.6rem;
      flex: 1;
      min-width: 0;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .count-badge {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Layout ── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 1.25rem;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 80px;
      min-width: 0;
    }
    .calendar-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .calendar-toggle:hover { border-color: var(--accent-light); }
    .calendar-toggle.is-open { border-radius: 10px 10px 0 0; border-bottom-color: var(--surface); }
    .calendar-toggle-title {
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .calendar-toggle-hint {
      font-size: 0.72rem;
      color: var(--accent);
      flex: 1;
      min-width: 0;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .calendar-toggle-arrow {
      font-size: 0.68rem;
      color: var(--text-muted);
      transition: transform 0.18s;
      flex-shrink: 0;
    }
    .calendar-toggle.is-open .calendar-toggle-arrow { transform: rotate(90deg); }

    /* ── Calendar ── */
    .calendar {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 0.85rem;
    }
    .calendar.open { display: block; }
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.65rem;
    }
    .cal-nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      width: 1.6rem;
      height: 1.6rem;
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .cal-nav-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
    .cal-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .cal-month-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      border-radius: 5px;
      color: var(--text-muted);
      position: relative;
    }
    .cal-day.pad { visibility: hidden; }
    .cal-day.has-entry {
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
    }
    .cal-day.has-entry::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent-light);
    }
    .cal-day.has-entry:hover { background: var(--border); }
    .cal-day.active { background: var(--accent); color: #fff; }
    .cal-day.active::after { background: #fff; }
    .cal-day.empty { opacity: 0.35; }
    .cal-reset {
      margin-top: 0.7rem;
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .cal-reset:hover { background: var(--border); color: var(--text); }
    .cal-reset.is-filtered { border-color: var(--accent); color: var(--accent); }

    /* ── Articles ── */
    .articles { min-width: 0; }
    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .article-card:hover { box-shadow: 0 4px 16px rgba(44,35,24,0.12); }

    .card-header {
      padding: 1rem 1.25rem 0.75rem;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .card-date-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.68rem;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
      letter-spacing: 0.04em;
    }
    .card-title-wrap { flex: 1; min-width: 0; }
    .card-title {
      font-family: "Noto Serif TC", serif;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
    }
    .card-summary {
      font-size: 0.76rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      line-height: 1.6;
    }
    .card-toggle {
      flex-shrink: 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      transition: transform 0.2s;
      margin-top: 2px;
    }
    .article-card.open .card-toggle { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .article-card.open .card-body { display: block; }

    /* ── Article content styles ── */
    .card-body h1 { display: none; }
    .card-body h2 {
      font-family: "Noto Serif TC", serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      margin: 1.2rem 0 0.6rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.04em;
    }
    .card-body h3 {
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text);
      margin: 0.9rem 0 0.3rem;
    }
    .card-body p {
      font-size: 0.82rem;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .card-body blockquote {
      font-size: 0.78rem;
      color: var(--text-muted);
      border-left: 2px solid var(--accent-light);
      padding-left: 0.75rem;
      margin: 0.5rem 0 0.8rem;
      font-style: italic;
    }
    .card-body ul {
      padding-left: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .card-body li {
      font-size: 0.81rem;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .card-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }
    .card-body a {
      color: var(--accent-light);
      text-decoration: none;
    }
    .card-body a:hover { text-decoration: underline; }
    .card-body strong { font-weight: 500; }
    .card-body .footer-note {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }
    .card-body .sources {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .card-body .sources a { font-size: 0.72rem; }

    /* ── What / So What / Now What card ── */
    .twn-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin: 0.4rem 0 0.9rem;
      background: var(--bg);
    }
    .twn-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 0.9rem;
      padding: 0.7rem 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .twn-row:last-child { border-bottom: none; }
    .twn-label .en {
      display: block;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--text);
    }
    .twn-label .zh {
      display: block;
      font-size: 0.66rem;
      color: var(--accent);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }
    .twn-content {
      font-size: 0.81rem;
      line-height: 1.85;
      color: var(--text);
    }

    /* ── Mobile ── */
    @media (max-width: 620px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { position: static; margin-bottom: 1.25rem; }
      .header-inner { gap: 0.5rem; }
      .site-title { font-size: 0.9rem; }
      .twn-row { grid-template-columns: 74px 1fr; gap: 0.6rem; padding: 0.6rem 0.7rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title">📰 Bella's AI 日報</div>
    <div class="controls">
      <span class="count-badge" id="countBadge"></span>
    </div>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <button class="calendar-toggle" id="calendarToggle" type="button" aria-expanded="false">
      <span class="calendar-toggle-title">日期選擇</span>
      <span class="calendar-toggle-hint" id="calendarToggleHint"></span>
      <span class="calendar-toggle-arrow">▸</span>
    </button>
    <div class="calendar" id="calendar">
      <div class="calendar-header">
        <button class="cal-nav-btn" id="calPrev" type="button" aria-label="上個月">‹</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav-btn" id="calNext" type="button" aria-label="下個月">›</button>
      </div>
      <div class="calendar-weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <button class="cal-reset" id="calReset" type="button">顯示全部</button>
    </div>
  </aside>

  <section class="articles" id="articleList">
    <div class="no-results" id="noResults" style="display:none">找不到相關內容</div>
  </section>
</div>

<script>
let allEntries = [];
let activeDate = '';
let entryDateSet = new Set();
let calYear = 0, calMonth = 0;   // calMonth: 1-12
let minYM = 0, maxYM = 0;        // year*12+month bounds
let calendarOpen = false;

async function loadData() {
  const res = await fetch('news.json');
  allEntries = await res.json();
  buildUI();
}

function buildUI() {
  allEntries.forEach(entry => entryDateSet.add(entry.date));

  if (allEntries.length) {
    const latest = new Date(allEntries[0].date + 'T00:00:00');
    const earliest = new Date(allEntries[allEntries.length - 1].date + 'T00:00:00');
    calYear = latest.getFullYear();
    calMonth = latest.getMonth() + 1;
    maxYM = latest.getFullYear() * 12 + (latest.getMonth() + 1);
    minYM = earliest.getFullYear() * 12 + (earliest.getMonth() + 1);
  }

  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 1) { calMonth = 12; calYear--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 12) { calMonth = 1; calYear++; }
    renderCalendar();
  });
  document.getElementById('calReset').addEventListener('click', () => setActiveDate(''));

  document.getElementById('calendarToggle').addEventListener('click', () => {
    setCalendarOpen(!calendarOpen);
  });

  renderCalendar();
  updateCalendarToggleHint();
  renderArticles(allEntries);
}

function setCalendarOpen(open) {
  calendarOpen = open;
  document.getElementById('calendar').classList.toggle('open', calendarOpen);
  document.getElementById('calendarToggle').classList.toggle('is-open', calendarOpen);
  document.getElementById('calendarToggle').setAttribute('aria-expanded', String(calendarOpen));
}

function updateCalendarToggleHint() {
  const hint = document.getElementById('calendarToggleHint');
  if (!activeDate) { hint.textContent = ''; return; }
  const d = new Date(activeDate + 'T00:00:00');
  hint.textContent = `已選 ${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function pad2(n) { return String(n).padStart(2, '0'); }

function renderCalendar() {
  const label = document.getElementById('calMonthLabel');
  const grid = document.getElementById('calendarGrid');
  const prevBtn = document.getElementById('calPrev');
  const nextBtn = document.getElementById('calNext');
  const resetBtn = document.getElementById('calReset');

  label.textContent = `${calYear} 年 ${calMonth} 月`;

  const curYM = calYear * 12 + calMonth;
  prevBtn.disabled = curYM <= minYM;
  nextBtn.disabled = curYM >= maxYM;
  resetBtn.classList.toggle('is-filtered', !!activeDate);

  grid.innerHTML = '';

  const firstWeekday = new Date(calYear, calMonth - 1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();

  for (let i = 0; i < firstWeekday; i++) {
    const pad = document.createElement('div');
    pad.className = 'cal-day pad';
    grid.appendChild(pad);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${calYear}-${pad2(calMonth)}-${pad2(day)}`;
    const cell = document.createElement('div');
    cell.textContent = day;
    cell.className = 'cal-day' + (entryDateSet.has(dateStr) ? ' has-entry' : ' empty');
    if (dateStr === activeDate) cell.classList.add('active');
    if (entryDateSet.has(dateStr)) {
      cell.addEventListener('click', () => setActiveDate(dateStr === activeDate ? '' : dateStr));
    }
    grid.appendChild(cell);
  }
}

function renderArticles(entries) {
  const list = document.getElementById('articleList');
  const noResults = document.getElementById('noResults');
  const countBadge = document.getElementById('countBadge');

  list.querySelectorAll('.article-card').forEach(el => el.remove());

  if (entries.length === 0) {
    noResults.style.display = 'block';
    countBadge.textContent = '';
    return;
  }
  noResults.style.display = 'none';
  countBadge.textContent = `${entries.length} 篇`;

  entries.forEach(entry => {
    const card = document.createElement('div');
    card.className = 'article-card';
    card.dataset.date = entry.date;

    const d = new Date(entry.date + 'T00:00:00');
    const dateLabel = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;

    card.innerHTML = `
      <div class="card-header">
        <span class="card-date-badge">${dateLabel}</span>
        <div class="card-title-wrap">
          <div class="card-title">${entry.title}</div>
          ${entry.summary ? `<div class="card-summary">${entry.summary}</div>` : ''}
        </div>
        <span class="card-toggle">▼</span>
      </div>
      <div class="card-body">${entry.content_html}</div>
    `;

    card.querySelectorAll('.card-body .tip').forEach(tipEl => {
      const tableHtml = buildTwnTable(tipEl.textContent);
      if (tableHtml) tipEl.outerHTML = tableHtml;
    });

    card.querySelector('.card-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    list.appendChild(card);
  });

  if (entries.length === 1) {
    document.querySelector('.article-card')?.classList.add('open');
  }
}

function buildTwnTable(text) {
  const cleaned = text.replace(/^\s*💡\s*/, '').trim();
  const match = cleaned.match(/【What】([\s\S]*?)【So What】([\s\S]*?)【Now What】([\s\S]*)$/);
  if (!match) return null;

  const rows = [
    ['What', '事件本質', match[1].trim()],
    ['So What', '影響判讀', match[2].trim()],
    ['Now What', '具體行動', match[3].trim()],
  ];

  const rowsHtml = rows.map(([en, zh, content]) => `
    <div class="twn-row">
      <div class="twn-label"><span class="en">${en}</span><span class="zh">${zh}</span></div>
      <div class="twn-content">${escapeHtml(content)}</div>
    </div>
  `).join('');

  return `<div class="twn-card">${rowsHtml}</div>`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function filter() {
  const results = activeDate ? allEntries.filter(e => e.date === activeDate) : allEntries;
  renderArticles(results);
}

function setActiveDate(date) {
  activeDate = date;

  if (date) {
    const d = new Date(date + 'T00:00:00');
    calYear = d.getFullYear();
    calMonth = d.getMonth() + 1;
  }
  renderCalendar();
  updateCalendarToggleHint();
  filter();

  if (date) {
    document.querySelector('.article-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

loadData().catch(() => {
  document.getElementById('articleList').innerHTML =
    '<div class="no-results">無法載入資料，請確認 news.json 存在。</div>';
});
</script>
</body>
</html>
